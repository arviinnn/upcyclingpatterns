              - { label: "Primary button (English)", name: "heroBtnPrimary_en", widget: "hidden", required: false }
              - { label: "Birinci kapak düğmesi", name: "heroBtnPrimary_tr", widget: "string", required: false }
              - { label: "Secondary button (English)", name: "heroBtnSecondary_en", widget: "hidden", required: false }
              - { label: "İkinci kapak düğmesi", name: "heroBtnSecondary_tr", widget: "string", required: false }
              - { label: "3R item 1 (English)", name: "heroProofOne_en", widget: "hidden", required: false }
              - { label: "3R maddesi 1", name: "heroProofOne_tr", widget: "string", required: false }
              - { label: "3R item 2 (English)", name: "heroProofTwo_en", widget: "hidden", required: false }
              - { label: "3R maddesi 2", name: "heroProofTwo_tr", widget: "string", required: false }
              - { label: "3R item 3 (English)", name: "heroProofThree_en", widget: "hidden", required: false }
              - { label: "3R maddesi 3", name: "heroProofThree_tr", widget: "string", required: false }
              - { label: "Snapshot tag (English)", name: "snapshotTag_en", widget: "hidden", required: false }
              - { label: "Proje özeti etiketi", name: "snapshotTag_tr", widget: "string", required: false }
              - { label: "Snapshot title (English)", name: "snapshotTitle_en", widget: "hidden", required: false }
              - { label: "Proje özeti başlığı", name: "snapshotTitle_tr", widget: "string", required: false }
              - { label: "Progress label (English)", name: "pulseLabel_en", widget: "hidden", required: false }
              - { label: "İlerleme etiketi", name: "pulseLabel_tr", widget: "string", required: false }
              - { label: "Progress complete text (English)", name: "pulseComplete_en", widget: "hidden", required: false }
              - { label: "İlerleme tamamlandı yazısı", name: "pulseComplete_tr", widget: "string", required: false }
              - { label: "Countries label (English)", name: "statCountries_en", widget: "hidden", required: false }
              - { label: "Ülke sayısı etiketi", name: "statCountries_tr", widget: "string", required: false }
              - { label: "Months label (English)", name: "statMonths_en", widget: "hidden", required: false }
              - { label: "Ay sayısı etiketi", name: "statMonths_tr", widget: "string", required: false }
              - { label: "Project end label (English)", name: "statProjectEnd_en", widget: "hidden", required: false }
              - { label: "Proje bitiş etiketi", name: "statProjectEnd_tr", widget: "string", required: false }
              - { label: "Official logos title (English)", name: "footerOfficialTitle_en", widget: "hidden", required: false }
              - { label: "Resmî logolar başlığı", name: "footerOfficialTitle_tr", widget: "string", required: false }
              - { label: "Partner logos title (English)", name: "footerPartnersTitle_en", widget: "hidden", required: false }
              - { label: "Ortak logolar başlığı", name: "footerPartnersTitle_tr", widget: "string", required: false }
              - { label: "Footer project line (English)", name: "footerProject_en", widget: "hidden", required: false }
              - { label: "Alt bilgi proje satırı", name: "footerProject_tr", widget: "string", required: false }
              - { label: "Footer copyright (English)", name: "footerCopy_en", widget: "hidden", required: false }
              - { label: "Alt bilgi telif yazısı", name: "footerCopy_tr", widget: "string", required: false }


  # -------------------------------------------------------------------
  #  3. FOOTER LOGOS
  # -------------------------------------------------------------------
  - name: "footer_logos"
    label: "Logolar"
    description: "Resmî proje, destek ve ortak okul logolarını yönetin."
    files:
      - name: "official_logos"
        label: "Resmî proje ve destek logoları"
        file: "data/logos.json"
        format: "json"
        fields:
          - label: "Resmî logolar"
            name: "official"
            widget: "list"
            required: false
            label_singular: "Resmî logo"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 12
            fields:
              - label: "Başlık (otomatik İngilizce)"
                name: "title_en"
                widget: "hidden"
                required: false
              - label: "Başlık"
                name: "title_tr"
                widget: "string"
                required: false
                pattern:
                  - '^.{2,100}$'
                  - "2-100 characters."
              - label: "Logo görseli"
                name: "image"
                widget: "image"
                required: false
                hint: "Transparent PNG/WebP or clean JPG preferred. Keep the logo centered."
                media_library:
                  config:
                    max_file_size: 2097152
                    allowed_extensions:
                      - jpg
                      - jpeg
                      - png
                      - webp
              - label: "Alt text (English)"
                name: "alt_en"
                widget: "hidden"
                required: false
              - label: "Logo açıklaması"
                name: "alt_tr"
                widget: "string"
                required: false
                pattern:
                  - '^(|.{2,200})$'
                  - "Empty or 2-200 characters."
              - label: "Geniş logo"
                name: "wide"
                widget: "boolean"
                default: false
                required: false
                hint: "Turn on for long horizontal logos such as EU funding marks."

              - <<: *display_order


  # -------------------------------------------------------------------
  #  4. DESIGN SETTINGS
  # -------------------------------------------------------------------
  - name: "design_settings"
    label: "Gelişmiş - Tasarım Ayarları"
    description: "Görsel boyutları ve sayfa ölçüleri. Günlük içerik eklerken bu bölüme girmeniz gerekmez."
    files:
      - name: "layout"
        label: "Layout, Hero and Logo Sizes"
        file: "data/design.json"
        format: "json"
        fields:
          - label: "Layout"
            name: "layout"
            widget: "object"
            required: false
            collapsed: false
            fields:
              - label: "Desktop Hero Height (svh)"
                name: "heroHeightDesktop"
                widget: "number"
                required: false
                value_type: "int"
                min: 84
                max: 100
                step: 1
                default: 90
                hint: "Controls the first-screen hero height on desktop. Lower values show the next section sooner."

              - label: "Tablet Hero Height (svh)"
                name: "heroHeightTablet"
                widget: "number"
                required: false
                value_type: "int"
                min: 88
                max: 104
                step: 1
                default: 96

              - label: "Mobile Hero Height (svh)"
                name: "heroHeightMobile"
                widget: "number"
                required: false
                value_type: "int"
                min: 90
                max: 108
                step: 1
                default: 92
                hint: "Keep this under 100 if the hero feels too tall on phones."

              - label: "Hero Top Crop (%)"
                name: "heroTopCrop"
                widget: "number"
                required: false
                value_type: "float"
                min: -12
                max: 2
                step: 0.5
                default: -5
                hint: "Negative values pull the image upward and crop a little from the top."

              - label: "Desktop Hero Image Height (%)"
                name: "heroImageHeightDesktop"
                widget: "number"
                required: false
                value_type: "int"
                min: 100
                max: 118
                step: 1
                default: 110

              - label: "Desktop Hero Image Position"
                name: "heroObjectPositionDesktop"
                widget: "string"
                required: false
                default: "center 45%"
                hint: "CSS object-position, for example center 45% or 58% center."
                pattern:
                  - '^(left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%)( (left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%))?$'
                  - "Use one or two CSS position tokens."

              - label: "Tablet Hero Image Position"
                name: "heroObjectPositionTablet"
                widget: "string"
                required: false
                default: "62% center"
                pattern:
                  - '^(left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%)( (left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%))?$'
                  - "Use one or two CSS position tokens."

              - label: "Mobile Hero Image Position"
                name: "heroObjectPositionMobile"
                widget: "string"
                required: false
                default: "68% center"
                pattern:
                  - '^(left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%)( (left|right|center|top|bottom|[0-9]{1,3}(\.[0-9]+)?%))?$'
                  - "Use one or two CSS position tokens."

              - label: "Page Section Density"
                name: "sectionDensity"
                widget: "select"
                required: false
                default: "compact"
                options:
                  - label: "Compact"
                    value: "compact"
