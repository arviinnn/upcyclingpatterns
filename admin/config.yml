                hint: "Partner logo for records and the footer logo strip. Partner cards show the country flag only. Standard: transparent PNG/WebP when possible; square 800x800 px or wide 1200x600 px; under 1 MB."
                media_library:
                  config:
                    max_file_size: 1048576
                    allowed_extensions:
                      - jpg
                      - jpeg
                      - png
                      - webp

              - label: "İnternet sitesi"
                name: "website"
                <<: *https_url

              - label: "İletişim e-postası"
                name: "email"
                <<: *email_field


  # -------------------------------------------------------------------
  #  7. FAQ
  # -------------------------------------------------------------------
  - name: "faq"
    label: "Sık Sorulan Sorular"
    label_singular: "Soru"
    description: "Soruyu ve cevabı yalnızca Türkçe yazın. İngilizce karşılıkları otomatik oluşturulur."
    files:
      - name: "faq_items"
        label: "Sorular"
        file: "data/faq.json"
        format: "json"
        fields:
          - label: "Sorular"
            name: "items"
            widget: "list"
            required: false
            label_singular: "Soru ekle"
            summary: "{{fields.question_tr}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            min: 0
            max: 100
            fields:
              - label: "Question (English)"
                name: "question_en"
                widget: "hidden"
                required: false
              - label: "Soru"
                name: "question_tr"
                widget: "string"
                required: false
                pattern:
                  - '^(|.{5,200})$'
                  - "Empty or 5–200 characters."

              - label: "Answer (English)"
                name: "answer_en"
                widget: "hidden"
                required: false
              - label: "Cevap"
                name: "answer_tr"
                widget: "text"
                required: false
                pattern:
                  - '^(|[\s\S]{10,1000})$'
                  - "Empty or 10–1000 characters."

              - label: "Otomatik Kategori"
                name: "category"
                widget: "hidden"
                required: false
                default: "general"

              - label: "Otomatik Sıra"
                name: "displayOrder"
                widget: "hidden"
                required: false

              - label: "Otomatik Tarih"
                name: "date"
                widget: "hidden"
                required: false
