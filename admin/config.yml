              - { label: "Navigation About (English)", name: "navAbout_en", widget: "hidden", required: false }
              - { label: "Menü: Hakkında", name: "navAbout_tr", widget: "string", required: false }
              - { label: "Navigation Explore (English)", name: "navExplore_en", widget: "hidden", required: false }
              - { label: "Menü: Keşfet", name: "navExplore_tr", widget: "string", required: false }
              - { label: "Navigation Partners (English)", name: "navPartners_en", widget: "hidden", required: false }
              - { label: "Menü: Ortaklar", name: "navPartners_tr", widget: "string", required: false }
              - { label: "Navigation Media (English)", name: "navMedia_en", widget: "hidden", required: false }
              - { label: "Menü: Medya", name: "navMedia_tr", widget: "string", required: false }
              - { label: "Navigation FAQ (English)", name: "navFaq_en", widget: "hidden", required: false }
              - { label: "Menü: SSS", name: "navFaq_tr", widget: "string", required: false }
              - { label: "Navigation Contact (English)", name: "navContact_en", widget: "hidden", required: false }
              - { label: "Menü: İletişim", name: "navContact_tr", widget: "string", required: false }
              - { label: "Hero eyebrow (English)", name: "heroEyebrow_en", widget: "hidden", required: false }
              - { label: "Kapak üst başlığı", name: "heroEyebrow_tr", widget: "string", required: false }
              - { label: "Hero title line 1 (English)", name: "heroTitleMain_en", widget: "hidden", required: false }
              - { label: "Kapak başlığı 1. satır", name: "heroTitleMain_tr", widget: "string", required: false }
              - { label: "Hero title line 2 (English)", name: "heroTitleAccent_en", widget: "hidden", required: false }
