# =====================================================================
#  Decap CMS Configuration — Upcycling Patterns
#  Erasmus+ KA210-SCH Project
# ---------------------------------------------------------------------
#  This file powers the /admin/ panel.
#
#  Netlify setup checklist:
#    1. Netlify Site → Identity → Enable Identity
#    2. Identity → Registration → Invite only
#    3. Identity → Services → Git Gateway → Enable Git Gateway
#    4. Identity → Invite users → invite editor emails
#
#  Important:
#    • /admin/config.yml must stay directly readable.
#    • Do not redirect /admin/config.yml to /admin/.
#    • images/uploads/ must exist in the GitHub repository.
#    • Keep images/uploads/.gitkeep so Git tracks the folder.
#
#  Publishing note:
#    • Omitting publish_mode uses Decap's direct-to-main default.
#    • This avoids temporary branches and pull requests for routine edits.
#    • Each save triggers the normal Netlify production deploy.
# =====================================================================


# ---------------------------------------------------------------------
#  BACKEND
# ---------------------------------------------------------------------
backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" — by {{author-login}}'
    update: 'Update {{collection}} "{{slug}}" — by {{author-login}}'
    delete: 'Delete {{collection}} "{{slug}}" — by {{author-login}}'
    uploadMedia: 'Upload media "{{path}}" — by {{author-login}}'
    deleteMedia: 'Delete media "{{path}}" — by {{author-login}}'


# ---------------------------------------------------------------------
#  PUBLISH MODE
# ---------------------------------------------------------------------
# Direct mode is intentionally used for this small editor team. Editorial
# workflow creates a branch and pull request for every unpublished entry;
# that adds several network operations and was causing fragile save/upload
# behavior. With publish_mode omitted, Decap commits only the file being
# edited directly to main.


# ---------------------------------------------------------------------
#  LOCAL DEVELOPMENT
# ---------------------------------------------------------------------
# Local testing only — uncomment when running `npx decap-server`:
#   npx decap-server
#   then open http://localhost:8080/admin/
# IMPORTANT: keep this commented out in production. When set to true,
# Decap CMS will try to talk to http://localhost:8081 before Git Gateway
# and editors will see "Failed to load entries" errors on the live site.
# local_backend: true


# ---------------------------------------------------------------------
#  MEDIA / UPLOADS
# ---------------------------------------------------------------------
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Decap's built-in media library is enabled by media_folder/public_folder.
# Do not add a top-level `media_library` block unless it also declares a
# custom provider `name`; an unnamed block makes the whole admin panel fail.


# ---------------------------------------------------------------------
#  SITE IDENTITY
# ---------------------------------------------------------------------
site_url: "https://upcyclingpatterns.com"
display_url: "https://upcyclingpatterns.com"
logo_url: "/images/branding/logo.jpeg"
locale: "tr"


# ---------------------------------------------------------------------
#  SLUG RULES
# ---------------------------------------------------------------------
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"


# ---------------------------------------------------------------------
#  EDITOR SETTINGS
# ---------------------------------------------------------------------
editor:
  preview: false

search: true
show_preview_links: false


# =====================================================================
#  REUSABLE FIELD ANCHORS
# =====================================================================

_cover_image: &cover_image
  label: "Fotoğraf Yükle"
  name: "image"
  widget: "image"
  required: false
  hint: "Telefondan fotoğraf seçebilirsiniz. Görsel otomatik optimize edilir ve standart kart ölçüsünde gösterilir."
  media_library:
    config:
      max_file_size: 2097152
      allowed_extensions:
        - jpg
        - jpeg
        - png
        - webp

_section_image: &section_image
  label: "İsteğe bağlı kart görseli"
  name: "image"
  widget: "image"
  required: false
  hint: "Optional. Upload from the media library; no code or file path needed. Standard: 1200x800 px (3:2) or 1200x750 px (16:10), JPG/WebP preferred, under 2 MB."
  media_library:
    config:
      max_file_size: 2097152
      allowed_extensions:
        - jpg
        - jpeg
        - png
        - webp

_section_alt: &section_alt
  label: "Görsel açıklaması (Türkçe)"
  name: "alt_tr"
  widget: "string"
  required: false
  hint: "Boş bırakırsanız Türkçe başlıktan otomatik hazırlanır; İngilizcesi DeepL ile oluşturulur."
  pattern:
    - '^(|.{2,200})$'
    - "Boş bırakın veya 2-200 karakter yazın."

_section_alt_en: &section_alt_en
  label: "Görsel açıklaması (otomatik İngilizce)"
  name: "alt_en"
  widget: "hidden"
  required: false

_section_card_fields: &section_card_fields
  - label: "Title (English)"
    name: "title_en"
    widget: "hidden"
    required: false
  - label: "Başlık"
    name: "title_tr"
    widget: "string"
    required: false
    pattern:
      - '^(|.{2,140})$'
      - "Empty or 2-140 characters."

  - label: "Text (English)"
    name: "text_en"
    widget: "hidden"
    required: false
  - label: "Metin"
    name: "text_tr"
    widget: "text"
    required: false
    pattern:
      - '^(|[\s\S]{5,700})$'
      - "Empty or 5-700 characters."

  - <<: *section_image

  - <<: *section_alt_en

  - <<: *section_alt

  - label: "İsteğe bağlı simge"
    name: "icon"
    widget: "string"
    required: false
    hint: "Optional short icon or emoji. If empty, the site uses an automatic number where needed."
    pattern:
      - '^(|.{1,12})$'
      - "Empty or 1-12 characters."

  - label: "Görüntüleme sırası"
    name: "displayOrder"
    widget: "number"
    value_type: "int"
    required: false
    min: 1
    max: 999
    hint: "Optional manual order. Lower numbers appear first. Leave empty to let the site use newest-first date ordering."

  - label: "Yayın / yükleme tarihi"
    name: "date"
    widget: "datetime"
    date_format: "YYYY-MM-DD"
    time_format: false
    format: "YYYY-MM-DD"
    picker_utc: true
    required: false
    hint: "Used for automatic newest-first ordering when Display Order is empty."

_iso_date: &iso_date
  widget: "datetime"
  required: false
  date_format: "YYYY-MM-DD"
  time_format: false
  format: "YYYY-MM-DD"
  picker_utc: true

_https_url: &https_url
  widget: "string"
  required: false
  pattern:
    - '^(|https:\/\/[^\s]+)$'
    - "Must be empty or a full https:// URL."

_youtube_url: &youtube_url
  widget: "string"
  required: false
  hint: "Paste a YouTube link. The site automatically turns it into the same standard 16:9 video card used in the Media Hub."
  pattern:
    - '^(|https?:\/\/(www\.)?(youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/)[A-Za-z0-9_-]+([&?][^\s]*)?)$'
    - "Must be empty or a valid YouTube URL."

_display_order: &display_order
  label: "Görüntüleme sırası"
  name: "displayOrder"
  widget: "number"
  value_type: "int"
  required: false
  min: 1
  max: 999
  hint: "Optional manual order. Lower numbers appear first. Leave empty to let the site use newest-first date ordering."

_publish_date: &publish_date
  label: "Yayın / yükleme tarihi"
  name: "date"
  <<: *iso_date
  required: false
  hint: "Used for automatic newest-first ordering when Display Order is empty."

_email_field: &email_field
  widget: "string"
  required: false
  pattern:
    - '^(|[^\s@]+@[^\s@]+\.[^\s@]{2,})$'
    - "Must be empty or a valid email address."


# =====================================================================
#  COLLECTIONS
# =====================================================================
collections:

  # -------------------------------------------------------------------
  #  1. SITE SETTINGS
  # -------------------------------------------------------------------
  - name: "site_settings"
    label: "Gelişmiş - Site Ayarları"
    description: "Proje bilgileri, iletişim, ana görsel ve sosyal bağlantılar. Türkçe alanları düzenleyin; İngilizce otomatik hazırlanır."
    editor:
      preview: false
    files:
      - name: "general"
        label: "Genel bilgiler"
        file: "data/site.json"
        format: "json"
        fields:
          - label: "Proje adı"
            name: "projectName"
            widget: "string"
            required: false
            default: "Upcycling Patterns"
            pattern:
              - '^.{2,80}$'
              - "2–80 characters."

          - label: "Proje kısa adı"
            name: "projectShortName"
            widget: "string"
            required: false
            default: "UpCyc"
            pattern:
              - '^.{2,30}$'
              - "2–30 characters."

          - label: "Proje e-postası"
            name: "projectEmail"
            <<: *email_field
            default: "upcyclingpatterns@gmail.com"

          - label: "Koordinatör kurum"
            name: "coordinator"
            widget: "string"
            required: false
            default: "MEV Koleji Özel Basınköy Anadolu Lisesi"
            pattern:
              - '^.{2,150}$'
              - "2–150 characters."

          - label: "Koordinatör şehir"
            name: "coordinatorCity"
            widget: "string"
            required: false
            default: "Istanbul"
            pattern:
              - '^.{2,80}$'
              - "2–80 characters."

          - label: "Koordinatör ülke (otomatik İngilizce)"
            name: "coordinatorCountry_en"
            widget: "hidden"
            required: false

          - label: "Koordinatör ülke"
            name: "coordinatorCountry_tr"
            widget: "string"
            required: false
            default: "Türkiye"
            pattern:
              - '^.{2,80}$'
              - "2–80 characters."

          - label: "Proje başlangıç tarihi"
            name: "startDate"
            <<: *iso_date
            default: "2025-09-01"

          - label: "Proje bitiş tarihi"
            name: "endDate"
            <<: *iso_date
            default: "2027-08-31"

          - label: "Ana sayfa kapak görseli"
            name: "heroImage"
            widget: "image"
            required: false
            hint: "Homepage hero. Standard: 1600x1067 px (3:2), JPG/WebP preferred, under 1 MB, important content centered."
            media_library:
              config:
                max_file_size: 1048576
                allowed_extensions:
                  - jpg
                  - jpeg
                  - png
                  - webp

          - label: "SEO ve sosyal paylaşım"
            name: "seo"
            widget: "object"
            required: false
            collapsed: true
            summary: "Browser title, Google description and share image"
            fields:
              - label: "Page Title (English)"
                name: "title_en"
                widget: "hidden"
                required: false
                default: "Upcycling Patterns | Erasmus+ KA210-SCH"
              - label: "Sayfa başlığı"
                name: "title_tr"
                widget: "string"
                required: false
                default: "Upcycling Patterns | Erasmus+ KA210-SCH"
                pattern:
                  - '^(|.{8,90})$'
                  - "Empty or 8-90 characters."

              - label: "Meta Description (English)"
                name: "description_en"
                widget: "hidden"
                required: false
                default: "Upcycling Patterns is an Erasmus+ KA210-SCH project focused on sustainability, environmental awareness, climate responsibility, and upcycling through international school collaboration."
              - label: "Google açıklaması"
                name: "description_tr"
                widget: "text"
                required: false
                pattern:
                  - '^(|[\s\S]{40,220})$'
                  - "Empty or 40-220 characters."

              - label: "Sosyal paylaşım görseli"
                name: "image"
                widget: "image"
                required: false
                hint: "Open Graph / Twitter image. Recommended: 1200x630 px."
                media_library:
                  config:
                    max_file_size: 2097152
                    allowed_extensions:
                      - jpg
                      - jpeg
                      - png
                      - webp

              - label: "Share Image Alt Text (English)"
                name: "imageAlt_en"
                widget: "hidden"
                required: false
              - label: "Paylaşım görseli açıklaması"
                name: "imageAlt_tr"
                widget: "string"
                required: false
                pattern:
                  - '^(|.{2,200})$'
                  - "Empty or 2-200 characters."

          - label: "Web3Forms Access Key"
            name: "web3formsKey"
            widget: "string"
            required: false
            hint: "Optional. The live form also has the key in index.html/script.js."
            pattern:
              - '^(|[a-zA-Z0-9-]{20,100})$'
              - "Must be empty or a Web3Forms access key."

          - label: "Sosyal medya"
            name: "social"
            widget: "object"
            required: false
            collapsed: true
            summary: "Project social media links"
            fields:
              - label: "Instagram URL"
                name: "instagram"
                <<: *https_url
                default: "https://www.instagram.com/upcycling_patterns/"

              - label: "X / Twitter URL"
                name: "x"
                <<: *https_url
                default: "https://x.com/UPatternsKA210"

              - label: "YouTube URL"
                name: "youtube"
                widget: "string"
                required: false
                default: "https://www.youtube.com/@upcyclingpatterns"
                pattern:
                  - '^(|https?:\/\/[^\s]+)$'
                  - "Must be empty or a full http:// or https:// URL."

              - label: "LinkedIn URL"
                name: "linkedin"
                <<: *https_url
                default: "https://www.linkedin.com/company/upcycling-patterns-ka210/"

              - label: "Facebook URL"
                name: "facebook"
                <<: *https_url


