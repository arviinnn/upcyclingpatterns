# =====================================================================
#  Decap CMS Configuration — Upcycling Patterns
#  Erasmus+ KA210-SCH Project
# ---------------------------------------------------------------------
#  This file powers the /admin/ panel.
#
#  Netlify setup checklist:
#    1. Netlify Site → Identity → Enable Identity
#    2. Identity → Registration → Invite only
#    3. Identity → Services → Git Gateway → Enable Git Gateway
#    4. Identity → Invite users → invite editor emails
#
#  Important:
#    • /admin/config.yml must stay directly readable.
#    • Do not redirect /admin/config.yml to /admin/.
#    • images/uploads/ must exist in the GitHub repository.
#    • Keep images/uploads/.gitkeep so Git tracks the folder.
#
#  Publishing note:
#    • Omitting publish_mode uses Decap's direct-to-main default.
#    • This avoids temporary branches and pull requests for routine edits.
#    • Each save triggers the normal Netlify production deploy.
# =====================================================================


# ---------------------------------------------------------------------
#  BACKEND
# ---------------------------------------------------------------------
backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" — by {{author-login}}'
    update: 'Update {{collection}} "{{slug}}" — by {{author-login}}'
    delete: 'Delete {{collection}} "{{slug}}" — by {{author-login}}'
    uploadMedia: 'Upload media "{{path}}" — by {{author-login}}'
    deleteMedia: 'Delete media "{{path}}" — by {{author-login}}'


# ---------------------------------------------------------------------
#  PUBLISH MODE
# ---------------------------------------------------------------------
# Direct mode is intentionally used for this small editor team. Editorial
# workflow creates a branch and pull request for every unpublished entry;
# that adds several network operations and was causing fragile save/upload
# behavior. With publish_mode omitted, Decap commits only the file being
# edited directly to main.


# ---------------------------------------------------------------------
#  LOCAL DEVELOPMENT
# ---------------------------------------------------------------------
# Local testing only — uncomment when running `npx decap-server`:
#   npx decap-server
#   then open http://localhost:8080/admin/
# IMPORTANT: keep this commented out in production. When set to true,
# Decap CMS will try to talk to http://localhost:8081 before Git Gateway
# and editors will see "Failed to load entries" errors on the live site.
# local_backend: true


# ---------------------------------------------------------------------
#  MEDIA / UPLOADS
# ---------------------------------------------------------------------
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Decap's built-in media library is enabled by media_folder/public_folder.
# Do not add a top-level `media_library` block unless it also declares a
# custom provider `name`; an unnamed block makes the whole admin panel fail.


# ---------------------------------------------------------------------
#  SITE IDENTITY
# ---------------------------------------------------------------------
site_url: "https://upcyclingpatterns.com"
display_url: "https://upcyclingpatterns.com"
logo_url: "/images/branding/logo.jpeg"
locale: "tr"


# ---------------------------------------------------------------------
#  SLUG RULES
# ---------------------------------------------------------------------
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"


# ---------------------------------------------------------------------
#  EDITOR SETTINGS
# ---------------------------------------------------------------------
editor:
  preview: false

search: true
show_preview_links: false


# =====================================================================
#  REUSABLE FIELD ANCHORS
# =====================================================================

_cover_image: &cover_image
  label: "Fotoğraf Yükle"
  name: "image"
  widget: "upcyc_image"
  required: false
  hint: "Telefondan fotoğraf seçebilirsiniz. Fotoğraf ayrı medya yüklemesi yapmadan küçük WebP olarak kayıt dosyasına eklenir."

_section_image: &section_image
  label: "İsteğe bağlı kart görseli"
  name: "image"
  widget: "upcyc_image"
  required: false
  hint: "Telefondan fotoğraf seçebilirsiniz. Fotoğraf ayrı medya yüklemesi yapmadan küçük WebP olarak kayıt dosyasına eklenir."

_section_alt: &section_alt
  label: "Görsel açıklaması (Türkçe)"
  name: "alt_tr"
  widget: "string"
  required: false
  hint: "Boş bırakırsanız Türkçe başlıktan otomatik hazırlanır; İngilizcesi DeepL ile oluşturulur."
  pattern:
    - '^(|.{2,200})$'
    - "Boş bırakın veya 2-200 karakter yazın."

_section_alt_en: &section_alt_en
  label: "Görsel açıklaması (otomatik İngilizce)"
  name: "alt_en"
  widget: "hidden"
  required: false

_youtube_url: &youtube_url
  widget: "string"
  required: false
  hint: "Paste a YouTube link. The site automatically turns it into the same standard 16:9 video card used in the Media Hub."
  pattern:
    - '^(|https?:\/\/(www\.)?(youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/)[A-Za-z0-9_-]+([&?][^\s]*)?)$'
    - "Must be empty or a valid YouTube URL."

_section_card_fields: &section_card_fields
  - label: "Title (English)"
    name: "title_en"
    widget: "hidden"
    required: false
  - label: "Başlık"
    name: "title_tr"
    widget: "string"
    required: false
    pattern:
      - '^(|.{2,140})$'
      - "Empty or 2-140 characters."

  - label: "Text (English)"
    name: "text_en"
    widget: "hidden"
    required: false
  - label: "Metin"
    name: "text_tr"
    widget: "text"
    required: false
    pattern:
      - '^(|[\s\S]{5,700})$'
      - "Empty or 5-700 characters."

  - <<: *section_image

  - label: "YouTube Bağlantısı"
    name: "youtubeUrl"
    <<: *youtube_url
    hint: "Video eklemek için YouTube adresini yapıştırın. Fotoğraf ekliyorsanız boş bırakın."

  - <<: *section_alt_en

  - <<: *section_alt

  - label: "İsteğe bağlı simge"
    name: "icon"
    widget: "string"
    required: false
    hint: "Optional short icon or emoji. If empty, the site uses an automatic number where needed."
    pattern:
      - '^(|.{1,12})$'
      - "Empty or 1-12 characters."

  - label: "Görüntüleme sırası"
    name: "displayOrder"
    widget: "number"
    value_type: "int"
    required: false
    min: 1
    max: 999
    hint: "Optional manual order. Lower numbers appear first. Leave empty to let the site use newest-first date ordering."

  - label: "Yayın / yükleme tarihi"
    name: "date"
    widget: "datetime"
    date_format: "YYYY-MM-DD"
    time_format: false
    format: "YYYY-MM-DD"
    picker_utc: true
    required: false
    hint: "Used for automatic newest-first ordering when Display Order is empty."

_iso_date: &iso_date
  widget: "datetime"
  required: false
  date_format: "YYYY-MM-DD"
  time_format: false
  format: "YYYY-MM-DD"
  picker_utc: true

_https_url: &https_url
  widget: "string"
  required: false
  pattern:
    - '^(|https:\/\/[^\s]+)$'
    - "Must be empty or a full https:// URL."

_display_order: &display_order
  label: "Görüntüleme sırası"
  name: "displayOrder"
  widget: "number"
  value_type: "int"
  required: false
  min: 1
  max: 999
  hint: "Optional manual order. Lower numbers appear first. Leave empty to let the site use newest-first date ordering."

_publish_date: &publish_date
  label: "Yayın / yükleme tarihi"
  name: "date"
  <<: *iso_date
  required: false
  hint: "Used for automatic newest-first ordering when Display Order is empty."

_email_field: &email_field
  widget: "string"
  required: false
  pattern:
    - '^(|[^\s@]+@[^\s@]+\.[^\s@]{2,})$'
    - "Must be empty or a valid email address."


# =====================================================================
#  COLLECTIONS
# =====================================================================
collections:

  # -------------------------------------------------------------------
  #  1. MAIN HOMEPAGE SECTIONS
  # -------------------------------------------------------------------
  - name: "homepage_sections"
    label: "Uluslararası İş Birliğiyle Sürdürülebilirliği Öğrenmek"
    label_singular: "Ana sayfa bölümü"
    description: "Ana sayfadaki uluslararası iş birliği kartlarını Türkçe düzenleyin; İngilizce metinler otomatik hazırlanır."
    files:
      - name: "homepage_cards"
        label: "Uluslararası İş Birliğiyle Sürdürülebilirliği Öğrenmek"
        file: "data/sections.json"
        format: "json"
        fields:
          - label: "Uluslararası İş Birliğiyle Sürdürülebilirliği Öğrenmek"
            name: "aboutCards"
            widget: "list"
            required: false
            label_singular: "Uluslararası iş birliği kartı"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 12
            fields: *section_card_fields

          - label: "Uluslararası İş Birliğiyle Sürdürülebilirliği Öğrenmek - Yolculuk"
            name: "missionItems"
            widget: "list"
            required: false
            label_singular: "Misyon maddesi"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 8
            fields: *section_card_fields


  # -------------------------------------------------------------------
  #  2. EVERYTHING IN ONE PLACE
  # -------------------------------------------------------------------
  - name: "explore_sections"
    label: "Her Şey Tek Bir Yerde"
    label_singular: "Her Şey Tek Bir Yerde bölümü"
    description: "Hedefler, takvim, faaliyetler, sonuçlar ve detaylar sekmelerini Türkçe düzenleyin. Her kartta fotoğraf veya YouTube bağlantısı kullanabilirsiniz."
    files:
      - name: "explore_cards"
        label: "Her Şey Tek Bir Yerde"
        file: "data/explore.json"
        format: "json"
        fields:
          - label: "Her Şey Tek Bir Yerde - Hedefler"
            name: "goals"
            widget: "list"
            required: false
            label_singular: "Hedef"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 4
            fields: *section_card_fields

          - label: "Her Şey Tek Bir Yerde - Zaman Çizelgesi"
            name: "timeline"
            widget: "list"
            required: false
            label_singular: "Zaman adımı"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 4
            fields: *section_card_fields

          - label: "Her Şey Tek Bir Yerde - Etkinlikler"
            name: "activities"
            widget: "list"
            required: false
            label_singular: "Etkinlik"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 4
            fields: *section_card_fields

          - label: "Her Şey Tek Bir Yerde - Sonuçlar"
            name: "results"
            widget: "list"
            required: false
            label_singular: "Sonuç"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 4
            fields: *section_card_fields

          - label: "Her Şey Tek Bir Yerde - Proje Ayrıntıları"
            name: "details"
            widget: "list"
            required: false
            label_singular: "Proje ayrıntısı"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            min: 0
            max: 4
            fields: *section_card_fields


  # -------------------------------------------------------------------
  #  3. GALLERY — IMAGE + YOUTUBE VIDEO READY
  # -------------------------------------------------------------------
  - name: "gallery"
    label: "Galeri"
    label_singular: "Galeri İçeriği"
    description: "Yalnızca Türkçe başlık yazın ve fotoğraf yükleyin veya YouTube bağlantısı yapıştırın. Diğer bütün bilgiler otomatik hazırlanır."
    files:
      - name: "gallery_items"
        label: "Galeri İçerikleri"
        file: "data/gallery.json"
        format: "json"
        fields:
          - label: "Galeri İçerikleri"
            name: "items"
            widget: "list"
            required: false
            label_singular: "Fotoğraf veya video ekle"
            summary: "{{fields.caption_tr}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            min: 0
            max: 100
            fields:
              - label: "Otomatik Medya Türü"
                name: "type"
                widget: "hidden"
                required: false
                default: "image"

              - label: "Başlık"
                name: "caption_tr"
                widget: "string"
                required: false
                hint: "Türkçe yazın; İngilizce başlık otomatik oluşturulur."
                pattern:
                  - '^(|.{2,120})$'
                  - "Boş bırakın veya 2-120 karakter yazın."

              - label: "Otomatik İngilizce Başlık"
                name: "caption_en"
                widget: "hidden"
                required: false

              - label: "Fotoğraf Yükle"
                name: "image"
                widget: "upcyc_image"
                required: false
                hint: "Telefondan fotoğraf seçebilirsiniz. Fotoğraf ayrı medya yüklemesi yapmadan küçük WebP olarak kayıt dosyasına eklenir."

              - label: "YouTube Bağlantısı"
                name: "youtubeUrl"
                <<: *youtube_url
                hint: "Video eklemek için YouTube adresini yapıştırın. Fotoğraf ekliyorsanız boş bırakın."

              - label: "Otomatik İngilizce Görsel Açıklaması"
                name: "alt_en"
                widget: "hidden"
                required: false
              - label: "Otomatik Türkçe Görsel Açıklaması"
                name: "alt_tr"
                widget: "hidden"
                required: false
                hint: "Optional but recommended for accessibility. Existing items do not need to be reopened or changed."
              - label: "Otomatik Kategori"
                name: "category"
                widget: "hidden"
                required: false
                default: "other"

              - label: "Otomatik Sıra"
                name: "displayOrder"
                widget: "hidden"
                required: false

              - label: "Otomatik Tarih"
                name: "date"
                widget: "hidden"
                required: false


  # -------------------------------------------------------------------
  #  4. NEWS
  # -------------------------------------------------------------------
  - name: "news"
    label: "Haberler"
    label_singular: "Haber"
    description: "Sadece Türkçe başlık ve fotoğraf ekleyin. İngilizce metin, tarih ve sıralama kaydederken otomatik hazırlanır."
    files:
      - name: "news_items"
        label: "Haberler"
        file: "data/news.json"
        format: "json"
        fields:
          - label: "Haberler"
            name: "items"
            widget: "list"
            required: false
            label_singular: "Haber ekle"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            min: 0
            max: 100
            fields:
              - label: "Otomatik Yıl"
                name: "year"
                widget: "hidden"
                required: false
                hint: "Short label shown on the card, e.g. 2025, March 2026."
              - label: "Otomatik Sıra"
                name: "displayOrder"
                widget: "hidden"
                required: false

              - label: "Otomatik Tarih"
                name: "date"
                widget: "hidden"
                required: false

              - label: "Title (English)"
                name: "title_en"
                widget: "hidden"
                required: false
              - label: "Başlık"
                name: "title_tr"
                widget: "string"
                required: false
                hint: "Türkçe yazın; İngilizcesi otomatik oluşturulur."
                pattern:
                  - '^(|.{2,140})$'
                  - "Empty or 2–140 characters."

              - label: "Summary (English)"
                name: "summary_en"
                widget: "hidden"
                required: false
              - label: "Otomatik Türkçe Özet"
                name: "summary_tr"
                widget: "hidden"
                required: false
              - label: "Full Content (English)"
                name: "content_en"
                widget: "hidden"
                required: false
                hint: "Optional long-form article. Markdown supported."

              - label: "Otomatik Türkçe İçerik"
                name: "content_tr"
                widget: "hidden"
                required: false

              - <<: *cover_image

              - label: "YouTube Bağlantısı"
                name: "youtubeUrl"
                <<: *youtube_url
                hint: "Video eklemek için YouTube adresini yapıştırın. Fotoğraf ekliyorsanız boş bırakın."

              - label: "Otomatik İngilizce Görsel Açıklaması"
                name: "alt_en"
                widget: "hidden"
                required: false
              - label: "Otomatik Türkçe Görsel Açıklaması"
                name: "alt_tr"
                widget: "hidden"
                required: false
                hint: "If you uploaded a cover image, describe it for screen readers."
              - label: "Ana Sayfada Göster"
                name: "featured"
                widget: "hidden"
                default: true
                required: false

              - label: "Harici Bağlantı"
                name: "url"
                widget: "hidden"
                required: false


  # -------------------------------------------------------------------
  #  5. DOWNLOADS / OUTPUTS
  # -------------------------------------------------------------------
  - name: "outputs"
    label: "Çıktılar"
    label_singular: "Çıktı"
    description: "Türkçe başlık yazın; dosya veya fotoğraf yükleyin. İngilizce metin, tür ve tarih otomatik hazırlanır."
    files:
      - name: "output_items"
        label: "Çıktılar"
        file: "data/outputs.json"
        format: "json"
        fields:
          - label: "Çıktılar"
            name: "items"
            widget: "list"
            required: false
            label_singular: "Çıktı ekle"
            summary: "{{fields.title_tr}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            min: 0
            max: 50
            fields:
              - label: "Title (English)"
                name: "title_en"
                widget: "hidden"
                required: false
              - label: "Başlık"
                name: "title_tr"
                widget: "string"
                required: false
                hint: "Türkçe yazın; İngilizcesi otomatik oluşturulur."
                pattern:
                  - '^(|.{2,120})$'
                  - "Empty or 2–120 characters."

              - label: "Description (English)"
                name: "description_en"
                widget: "hidden"
                required: false
              - label: "Otomatik Türkçe Açıklama"
                name: "description_tr"
                widget: "hidden"
                required: false
              - label: "Dosya Yükle"
                name: "file"
                widget: "file"
                required: false
                hint: "PDF, DOCX veya ZIP yükleyebilirsiniz. En fazla 25 MB."
                media_library:
                  config:
                    max_file_size: 26214400
                    allowed_extensions:
                      - pdf
                      - docx
                      - zip

              - <<: *cover_image

              - label: "YouTube Bağlantısı"
                name: "youtubeUrl"
                <<: *youtube_url
                hint: "Video eklemek için YouTube adresini yapıştırın. Fotoğraf ekliyorsanız boş bırakın."

              - label: "Otomatik Tür"
                name: "type"
                widget: "hidden"
                required: false
                default: "other"

              - label: "Otomatik Sıra"
                name: "displayOrder"
                widget: "hidden"
                required: false

              - label: "Otomatik Tarih"
                name: "date"
                widget: "hidden"
                required: false


  # -------------------------------------------------------------------
  #  6. FAQ
  # -------------------------------------------------------------------
  - name: "faq"
    label: "Sık Sorulan Sorular"
    label_singular: "Soru"
    description: "Soruyu ve cevabı yalnızca Türkçe yazın. İngilizce karşılıkları otomatik oluşturulur."
    files:
      - name: "faq_items"
        label: "Sorular"
        file: "data/faq.json"
        format: "json"
        fields:
          - label: "Sorular"
            name: "items"
            widget: "list"
            required: false
            label_singular: "Soru ekle"
            summary: "{{fields.question_tr}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            min: 0
            max: 100
            fields:
              - label: "Question (English)"
                name: "question_en"
                widget: "hidden"
                required: false
              - label: "Soru"
                name: "question_tr"
                widget: "string"
                required: false
                pattern:
                  - '^(|.{5,200})$'
                  - "Empty or 5–200 characters."

              - label: "Answer (English)"
                name: "answer_en"
                widget: "hidden"
                required: false
              - label: "Cevap"
                name: "answer_tr"
                widget: "text"
                required: false
                pattern:
                  - '^(|[\s\S]{10,1000})$'
                  - "Empty or 10–1000 characters."

              - <<: *cover_image

              - label: "YouTube Bağlantısı"
                name: "youtubeUrl"
                <<: *youtube_url
                hint: "Video eklemek için YouTube adresini yapıştırın. Fotoğraf ekliyorsanız boş bırakın."

              - label: "Otomatik İngilizce Görsel Açıklaması"
                name: "alt_en"
                widget: "hidden"
                required: false
              - label: "Otomatik Türkçe Görsel Açıklaması"
                name: "alt_tr"
                widget: "hidden"
                required: false

              - label: "Otomatik Kategori"
                name: "category"
                widget: "hidden"
                required: false
                default: "general"

              - label: "Otomatik Sıra"
                name: "displayOrder"
                widget: "hidden"
                required: false

              - label: "Otomatik Tarih"
                name: "date"
                widget: "hidden"
                required: false
