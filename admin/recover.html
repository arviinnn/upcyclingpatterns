<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Admin Oturumu Yenileniyor</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <style>
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 20px; background: #eff6f0; color: #14351e; font: 16px/1.6 Inter, system-ui, sans-serif; }
    main { width: min(520px, 100%); padding: 28px; border: 1px solid #c5ddcb; border-radius: 8px; background: #fff; text-align: center; box-shadow: 0 18px 50px rgba(20, 53, 30, 0.12); }
    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    p { margin: 0; color: #53675a; }
  </style>
</head>
<body>
<main>
  <h1>Admin oturumu yenileniyor</h1>
  <p>Eski giriş bilgileri temizleniyor. Birazdan yeniden giriş ekranı açılacak.</p>
</main>
<script>
  (function () {
    "use strict";
    try {
      Object.keys(localStorage).forEach(function (key) {
        if (/gotrue|netlify|decap|cms/i.test(key)) localStorage.removeItem(key);
      });
      sessionStorage.clear();
    } catch (error) {}
    window.setTimeout(function () { window.location.replace('/admin/?session-reset=1'); }, 700);
  })();
</script>
</body>
</html>
