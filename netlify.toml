# =====================================================================
#  Netlify Configuration — Upcycling Patterns
#  Erasmus+ KA210-SCH Project
# ---------------------------------------------------------------------
#  Controls:
#    • static site publish settings
#    • security headers
#    • cache headers
#    • Decap CMS / admin compatibility
#    • URL redirects and aliases
#    • custom 404 handling
#
#  IMPORTANT:
#    • /admin/config.yml must remain directly readable by Decap CMS.
#    • Do NOT redirect /admin/config.yml or /admin/config.yaml to /admin/.
#    • This project is a static HTML/CSS/JS site, so no build command is needed.
# =====================================================================


# ---------------------------------------------------------------------
#  BUILD
# ---------------------------------------------------------------------
[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "24"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true


# =====================================================================
#  GLOBAL SECURITY HEADERS
# =====================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "SAMEORIGIN"
    X-DNS-Prefetch-Control       = "on"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), interest-cohort=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"

    # Public-site Content Security Policy.
    # Allows:
    #   • local CSS/JS
    #   • inline CSS/JS currently used by the HTML pages
    #   • Google Fonts
    #   • Web3Forms contact form submission
    #   • YouTube / YouTube nocookie embeds if added later
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      media-src 'self' https: blob:;
      connect-src 'self' https://api.web3forms.com;
      frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;
      frame-ancestors 'self';
      base-uri 'self';
      form-action 'self' https://api.web3forms.com;
      object-src 'none';
      manifest-src 'self';
      worker-src 'self' blob:;
      upgrade-insecure-requests
    """


# =====================================================================
#  ADMIN PANEL — Decap CMS
# ---------------------------------------------------------------------
#  Decap CMS needs a more permissive CSP because it can load CMS scripts
#  and communicate with Netlify Identity / Netlify API / GitHub API.
# =====================================================================
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control   = "public, max-age=0, must-revalidate"
    Clear-Site-Data = "\"cache\""
    X-Robots-Tag    = "noindex, nofollow, noarchive, nosnippet, noimageindex"

    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      media-src 'self' https: blob:;
      connect-src 'self' https://identity.netlify.com https://api.netlify.com https://api.github.com https://github.com https://raw.githubusercontent.com https://unpkg.com https://cdn.jsdelivr.net;
      frame-src 'self' https://identity.netlify.com https://www.youtube.com https://www.youtube-nocookie.com;
      frame-ancestors 'self';
      base-uri 'self';
      form-action 'self' https://identity.netlify.com https://api.netlify.com;
      object-src 'none';
      worker-src 'self' blob:;
      manifest-src 'self';
      upgrade-insecure-requests
    """


# =====================================================================
#  ADMIN CONFIG FILES
# ---------------------------------------------------------------------
#  Decap CMS reads /admin/config.yml directly.
#  These files are not secret, but they should not be indexed.
# =====================================================================
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type  = "text/yaml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/admin/config.yaml"
  [headers.values]
    Content-Type  = "text/yaml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow, noarchive, nosnippet"


# =====================================================================
#  CMS JSON DATA
# ---------------------------------------------------------------------
#  Keep CMS JSON data out of search engines.
#  Short cache so admin edits appear quickly after deploy.
# =====================================================================
[[headers]]
  for = "/data/*"
  [headers.values]
    X-Robots-Tag                = "noindex, nofollow, noarchive, nosnippet"
    Content-Type                = "application/json; charset=utf-8"
    Cache-Control               = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"


# =====================================================================
#  CACHE — HTML
# ---------------------------------------------------------------------
#  HTML should always revalidate so content changes appear quickly.
# =====================================================================
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Clear-Site-Data = "\"cache\""

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"


# =====================================================================
#  CACHE — CSS / JS
# ---------------------------------------------------------------------
#  During active development, do not aggressively cache CSS/JS.
#  This avoids old script/style files staying in the browser.
# =====================================================================
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# =====================================================================
#  CACHE — IMAGES
# ---------------------------------------------------------------------
#  General images can be cached briefly.
#  CMS uploads revalidate immediately because uploaded project images may
#  be replaced or changed while the site is being edited.
# =====================================================================
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control               = "public, max-age=86400, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/images/uploads/*"
  [headers.values]
    Cache-Control               = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/images/hero/*"
  [headers.values]
    Cache-Control               = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control               = "public, max-age=86400, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"

[[headers]]
  for = "/favicon-48x48.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"
    Content-Type  = "image/png"

[[headers]]
  for = "/favicon-96x96.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"
    Content-Type  = "image/png"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"

[[headers]]
  for = "/reset-browser.html"
  [headers.values]
    Cache-Control   = "no-store, max-age=0"
    Clear-Site-Data = "\"cache\", \"cookies\", \"storage\""
    X-Robots-Tag    = "noindex, nofollow, noarchive"

[[headers]]
  for = "/reset-browser"
  [headers.values]
    Cache-Control   = "no-store, max-age=0"
    Clear-Site-Data = "\"cache\", \"cookies\", \"storage\""
    X-Robots-Tag    = "noindex, nofollow, noarchive"


# =====================================================================
#  SEO / PWA META FILES
# =====================================================================
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap.xsl"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/xsl; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json; charset=utf-8"


# =====================================================================
#  SERVICE WORKER
# ---------------------------------------------------------------------
#  Harmless if /sw.js does not exist yet.
# =====================================================================
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"


# =====================================================================
#  REDIRECTS
# =====================================================================

# Serve the www alias directly instead of issuing a host-to-host redirect.
# This terminates old opposing apex/www redirects cached by a browser.
[[redirects]]
  from   = "https://www.upcyclingpatterns.com/*"
  to     = "/:splat"
  status = 200
  force  = true

# ---------------------------------------------------------------------
#  HTTPS + CANONICAL HOST
# ---------------------------------------------------------------------
# Netlify already redirects HTTP to HTTPS and automatically redirects the
# alternate apex/www domain to the primary production domain. Duplicating
# those host rules here can conflict with a changed Netlify primary-domain
# setting and can leave browsers with opposing cached 301 redirects.


# ---------------------------------------------------------------------
#  CLEAN ROOT
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/manifest.webmanifest"
  to     = "/manifest.json"
  status = 301

[[redirects]]
  from   = "/reset-browser"
  to     = "/reset-browser.html"
  status = 200


# ---------------------------------------------------------------------
#  TURKISH PATH
# ---------------------------------------------------------------------
#  Same static homepage, language detected client-side by script.js.
# ---------------------------------------------------------------------
[[redirects]]
from   = "/tr"
to     = "/tr/"
status = 301

[[redirects]]
  from   = "/tr/"
  to     = "/index.html"
  status = 200


# ---------------------------------------------------------------------
#  ADMIN PANEL
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301

# Do NOT redirect /admin/config.yml or /admin/config.yaml.
# Decap CMS must read /admin/config.yml directly.


# ---------------------------------------------------------------------
#  LEGAL / INFO PAGE ALIASES
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/privacy"
  to     = "/privacy-policy.html"
  status = 301

[[redirects]]
  from   = "/privacy/"
  to     = "/privacy-policy.html"
  status = 301

[[redirects]]
  from   = "/cookies"
  to     = "/cookie-policy.html"
  status = 301

[[redirects]]
  from   = "/cookies/"
  to     = "/cookie-policy.html"
  status = 301

[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 301

[[redirects]]
  from   = "/terms/"
  to     = "/terms.html"
  status = 301

[[redirects]]
  from   = "/accessibility"
  to     = "/accessibility.html"
  status = 301

[[redirects]]
  from   = "/accessibility/"
  to     = "/accessibility.html"
  status = 301

[[redirects]]
  from   = "/funding"
  to     = "/funding-disclaimer.html"
  status = 301

[[redirects]]
  from   = "/funding/"
  to     = "/funding-disclaimer.html"
  status = 301


# ---------------------------------------------------------------------
#  COMMON CRAWLER / ATTACK PROBES
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/wp-admin/*"
  to     = "/404.html"
  status = 404

[[redirects]]
  from   = "/wp-login.php"
  to     = "/404.html"
  status = 404

[[redirects]]
  from   = "/.env"
  to     = "/404.html"
  status = 404

[[redirects]]
  from   = "/.git/*"
  to     = "/404.html"
  status = 404


# ---------------------------------------------------------------------
#  CUSTOM 404 — must remain last
# ---------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404


# =====================================================================
#  DEPLOY CONTEXTS
# ---------------------------------------------------------------------
#  Keep only environment flags here.
#  Header rules above remain the source of truth for this static site.
# =====================================================================
[context.production]
  [context.production.environment]
    NETLIFY_PRODUCTION = "true"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NETLIFY_PREVIEW = "true"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NETLIFY_BRANCH_DEPLOY = "true"
